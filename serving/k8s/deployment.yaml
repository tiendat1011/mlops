apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: mlops
  labels:
    app.kubernetes.io/name: model-serving
    app.kubernetes.io/component: serving
    app.kubernetes.io/part-of: mlops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: model-serving
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-serving
        app.kubernetes.io/component: serving
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: serving
          image: model-serving:latest  # Updated by CI/CD
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MODEL_NAME
              value: "customer_churn_model"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.mlops.svc.cluster.local:5000"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.mlops.svc.cluster.local:9000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: FEAST_FEATURE_STORE_YAML
              value: "/opt/feast"
          volumeMounts:
            - name: feast-config
              mountPath: /opt/feast
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: feast-config
          configMap:
            name: feast-config
