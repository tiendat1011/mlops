apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mlops-platform
spec:
  project: mlops
  source:
    repoURL: ''  # <-- Set your Git repo URL
    targetRevision: main
    path: infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
