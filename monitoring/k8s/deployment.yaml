apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-detector
  namespace: mlops
  labels:
    app.kubernetes.io/name: drift-detector
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: mlops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: drift-detector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: drift-detector
        app.kubernetes.io/component: monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: drift-detector
          image: drift-detector:latest  # Updated by CI/CD
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.mlops.svc.cluster.local:5000"
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://minio.mlops.svc.cluster.local:9000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-s3-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: MODEL_NAME
              value: "customer_churn_model"
            - name: DRIFT_THRESHOLD
              value: "0.2"
            - name: CHECK_INTERVAL_SECONDS
              value: "3600"
            - name: AIRFLOW_API_URL
              value: "http://airflow-webserver.mlops.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: drift-detector
  namespace: mlops
  labels:
    app.kubernetes.io/name: drift-detector
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: drift-detector
