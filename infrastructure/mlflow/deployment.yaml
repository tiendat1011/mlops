apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/component: experiment-tracking
    app.kubernetes.io/part-of: mlops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/component: experiment-tracking
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.9.0
          command:
            - /bin/bash
            - -c
            - |
              pip install --no-cache-dir psycopg2-binary boto3 && \
              mlflow server \
                --host=0.0.0.0 \
                --port=5000 \
                --backend-store-uri="$MLFLOW_BACKEND_STORE_URI" \
                --default-artifact-root="$MLFLOW_DEFAULT_ARTIFACT_ROOT" \
                --serve-artifacts \
                --allowed-hosts="*"
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mlflow-config
            - secretRef:
                name: mlflow-s3-secret
          resources:
            requests:
              cpu: 512m
              memory: 768Mi
            limits:
              cpu: 1
              memory: 1.5Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
