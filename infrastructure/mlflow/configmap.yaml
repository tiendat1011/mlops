apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: mlops
  labels:
    app.kubernetes.io/name: mlflow
data:
  # Backend store: PostgreSQL
  MLFLOW_BACKEND_STORE_URI: "postgresql://mlflow_user:changeme-mlflow-db-2024@postgres.mlops.svc.cluster.local:5432/mlflow_db"
  # Artifact store: MinIO (S3-compatible)
  MLFLOW_DEFAULT_ARTIFACT_ROOT: "s3://mlflow-artifacts/"
  # MinIO endpoint for boto3/S3
  MLFLOW_S3_ENDPOINT_URL: "http://minio.mlops.svc.cluster.local:9000"
  # Server settings
  MLFLOW_HOST: "0.0.0.0"
  MLFLOW_PORT: "5000"
