# RBAC for Airflow KubernetesExecutor
# Allows the Airflow scheduler to create/manage worker pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: airflow-executor
  namespace: mlops
  labels:
    app.kubernetes.io/name: airflow
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: airflow-executor
  namespace: mlops
  labels:
    app.kubernetes.io/name: airflow
subjects:
  - kind: ServiceAccount
    name: airflow-worker
    namespace: mlops
  - kind: ServiceAccount
    name: airflow-scheduler
    namespace: mlops
roleRef:
  kind: Role
  name: airflow-executor
  apiGroup: rbac.authorization.k8s.io
