# ============================================================
# Apache Airflow Helm Chart Values — Airflow 3.1.7
# Chart: apache-airflow/airflow (https://airflow.apache.org/docs/helm-chart/)
#
# Usage:
#   helm repo add apache-airflow https://airflow.apache.org
#   helm install airflow apache-airflow/airflow \
#     -n mlops -f helm-values.yaml
# ============================================================

# --- Airflow Core ---
airflowVersion: "3.1.7"
defaultAirflowRepository: apache/airflow
defaultAirflowTag: "3.1.7"

# --- Executor ---
# KubernetesExecutor: each task runs as its own Pod — no Celery/Redis needed
executor: "KubernetesExecutor"

# --- Database ---
# Use existing PostgreSQL instead of the bundled one
postgresql:
  enabled: false

data:
  metadataConnection:
    user: airflow_user
    pass: changeme-airflow-db-2024
    protocol: postgresql
    host: postgres.mlops.svc.cluster.local
    port: 5432
    db: airflow_db

# --- API Server (Airflow 3.x — replaces webserver for API) ---
apiServer:
  enabled: true
  replicas: 1
  service:
    type: NodePort
    ports:
      - name: api-server
        port: 8080
        nodePort: 30808
  args: ["bash", "-c", "exec airflow api-server"]
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# --- Web Server (UI only — Airflow 3.x keeps it for the dashboard) ---
webserver:
  enabled: true
  replicas: 1
  args: ["bash", "-c", "exec airflow webserver"]
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# --- Default Admin User ---
createUserJob:
  defaultUser:
    role: Admin
    username: admin
    email: admin@mlops.local
    firstName: Admin
    lastName: User
    password: admin

# --- Scheduler ---
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# --- Git Sync for DAGs ---
# Automatically sync DAGs from Git repository
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: "https://github.com/tiendat1011/mlops.git"
    branch: master
    subPath: "pipelines/dags"
    period: "60s"           # Sync every 60 seconds
    depth: 1
    rev: HEAD
    ref: master

    # For private repos, use SSH key or token:
    # credentialsSecret: git-credentials
    # sshKeySecret: airflow-ssh-git-secret


# --- Logs ---
# Local logging first. Enable remote logging after creating the minio_default connection.
# To enable later:
#   1. Create Airflow Connection 'minio_default' (type: Amazon Web Services, endpoint: http://minio:9000)
#   2. Uncomment the remote_logging config below and helm upgrade
logs:
  persistence:
    enabled: false

config:
  core:
    remote_logging: "False"
    # remote_base_log_folder: "s3://airflow-logs/"
    # remote_log_conn_id: "minio_default"
  logging:
    remote_logging: "False"

# --- Environment Variables ---
# Injected into all Airflow pods (api-server, webserver, scheduler, workers, triggerer)
env:
  # MLflow tracking server
  - name: MLFLOW_TRACKING_URI
    value: "http://mlflow.mlops.svc.cluster.local:5000"
  # MinIO S3-compatible endpoint (for MLflow artifacts)
  - name: MLFLOW_S3_ENDPOINT_URL
    value: "http://minio.mlops.svc.cluster.local:9000"
  - name: AWS_ACCESS_KEY_ID
    value: "mlops-admin"
  - name: AWS_SECRET_ACCESS_KEY
    value: "changeme-minio-secret-2024"
  # Feast
  - name: FEAST_FEATURE_STORE_YAML
    value: "/opt/feast/feature_store.yaml"

# --- Extra Volumes (Feast config) ---
extraVolumes:
  - name: feast-config
    configMap:
      name: feast-config

extraVolumeMounts:
  - name: feast-config
    mountPath: /opt/feast

# --- KubernetesExecutor settings ---
# Pod template for task pods
kubernetesExecutor:
  # Namespace where worker pods are created
  namespace: mlops
  # Delete completed pods after this many seconds
  deleteWorkerPodsOnFailure: false

# --- Triggerer ---
triggerer:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- Dag Processor (Airflow 3.x — separate dag parsing) ---
dagProcessor:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# --- Disable components we don't need ---
statsd:
  enabled: false
flower:
  enabled: false
redis:
  enabled: false
pgbouncer:
  enabled: false
