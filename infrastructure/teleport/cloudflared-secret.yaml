##
## Cloudflared Tunnel Credentials Secret
##
## HƯỚNG DẪN:
## 1. Tạo tunnel: cloudflared tunnel create teleport-tunnel
## 2. File credentials sẽ được lưu tại: ~/.cloudflared/<TUNNEL_ID>.json
## 3. Tạo secret từ file:
##    kubectl create secret generic cloudflared-tunnel-credentials \
##      --from-file=credentials.json=$HOME/.cloudflared/<TUNNEL_ID>.json \
##      -n ns-teleport
##
## HOẶC điền trực tiếp vào template bên dưới (base64 encoded):
##
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-credentials
  namespace: ns-teleport
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/part-of: teleport
type: Opaque
data:
  # Base64 encoded content of <TUNNEL_ID>.json
  # Dùng lệnh: cat ~/.cloudflared/<TUNNEL_ID>.json | base64 -w0
  credentials.json: <BASE64_ENCODED_CREDENTIALS_JSON>
