##
## Tailscale Ingress - Expose Teleport via Tailscale Funnel
##
## Tailscale K8s Operator sẽ tạo một Tailscale node và
## expose Teleport service ra public internet qua Funnel.
##
## Domain: teleport-funnel.<tailnet-name>.ts.net
##
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teleport-funnel
  namespace: ns-teleport
  labels:
    app.kubernetes.io/name: teleport-funnel
    app.kubernetes.io/part-of: teleport
  annotations:
    # Expose ra public internet (không chỉ tailnet)
    tailscale.com/funnel: "true"
    # Tag cho ACL policy
    tailscale.com/tags: "tag:k8s"
spec:
  ingressClassName: tailscale
  # TLS do Tailscale Funnel tự quản lý (Let's Encrypt cert cho *.ts.net)
  tls:
    - hosts:
        - teleport-funnel
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teleport
                port:
                  number: 443
