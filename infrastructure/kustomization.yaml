apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mlops

resources:
  - namespace.yaml
  - secrets/
  - minio/
  - postgres/
  - redis/
  - mlflow/
  # Airflow is installed via Helm chart, not raw manifests
  # Use: helm install airflow apache-airflow/airflow -n mlops -f airflow/helm-values.yaml
  # The RBAC manifest can be applied separately:
  - airflow/rbac.yaml
