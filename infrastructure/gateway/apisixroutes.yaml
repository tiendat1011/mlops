        paths:
          - /feast-api*
      backends:
        - serviceName: feast-feature-server
          servicePort: 6566
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - ^/feast-api(/|$)(.*)
