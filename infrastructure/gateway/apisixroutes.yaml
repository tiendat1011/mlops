# ApisixRoute: Model Serving API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: model-serving-route
  namespace: mlops
spec:
  ingressClassName: apisix
  http:
    - name: predict-api
      match:
        paths:
          - /api/v1/predict*
          - /api/v1/health*
          - /api/v1/metrics*
      backends:
        - serviceName: model-serving
          servicePort: 8000
---
# ApisixRoute: MLflow UI + API
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mlflow-route
  namespace: mlops
spec:
  ingressClassName: apisix
  http:
    - name: mlflow-ui
      match:
        paths:
          - /mlflow*
      backends:
        - serviceName: mlflow
          servicePort: 5000
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri:
              - ^/mlflow(/|$)(.*)
              - /$2
---
