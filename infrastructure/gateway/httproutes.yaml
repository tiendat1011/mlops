# HTTPRoute: Feast Feature Server UI
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: feast-route
  namespace: mlops
  labels:
    app.kubernetes.io/name: feast
    app.kubernetes.io/component: gateway
spec:
  parentRefs:
    - name: mlops-gateway
      namespace: mlops
  hostnames:
    - "mlops.local"
  rules:
    # Feast UI
    - matches:
        - path:
            type: PathPrefix
            value: /feast
      backendRefs:
        - name: feast-feature-server
          port: 8888
    # Feast API (get-online-features)
    - matches:
        - path:
            type: PathPrefix
            value: /feast-api
      backendRefs:
        - name: feast-feature-server
          port: 6566