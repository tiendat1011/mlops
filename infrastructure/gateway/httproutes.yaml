# HTTPRoute: Model Serving API
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-serving-route
  namespace: mlops
  labels:
    app.kubernetes.io/name: model-serving
    app.kubernetes.io/component: gateway
spec:
  parentRefs:
    - name: mlops-gateway
      namespace: mlops
  hostnames:
    - "mlops.local"
  rules:
    # Prediction API
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/predict
        - path:
            type: PathPrefix
            value: /api/v1/health
      backendRefs:
        - name: model-serving
          port: 8000
    # Prometheus metrics (same service, different path)
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/metrics
      backendRefs:
        - name: model-serving
          port: 8000
---
