apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: mlops
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: setup
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-11-17T19-35-25Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO to be ready..."
              until mc alias set myminio http://minio.mlops.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "MinIO not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Creating buckets..."
              mc mb --ignore-existing myminio/mlflow-artifacts
              mc mb --ignore-existing myminio/airflow-logs
              mc mb --ignore-existing myminio/feast-data
              echo "All buckets created successfully."
              mc ls myminio/
