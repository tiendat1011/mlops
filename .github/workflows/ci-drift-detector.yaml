# CI Pipeline: Drift Detector
# Trigger: changes to monitoring/ directory

name: CI - Drift Detector

on:
  push:
    branches: [master, develop]
    paths:
      - 'monitoring/**'
  pull_request:
    branches: [master]
    paths:
      - 'monitoring/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/drift-detector

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv pip install --system \
            evidently>=0.4.0 \
            prometheus-client>=0.21.0 \
            pandas>=2.2.0 \
            numpy>=1.26.0 \
            scipy>=1.14.0 \
            mlflow>=3.9.0 \
            boto3>=1.35.0 \
            httpx>=0.28.0 \
            ruff

      - name: Lint with ruff
        run: |
          ruff check monitoring/drift_detector/ --output-format=github --exit-zero

      - name: Syntax check
        run: |
          python -m py_compile monitoring/drift_detector/main.py

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/drift_detector
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
