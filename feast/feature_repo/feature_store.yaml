project: mlops_features
provider: local

# --- Registry ---
# Stores feature definitions metadata (entities, feature views, data sources)
registry:
  registry_type: sql
  path: postgresql+psycopg://feast_user:changeme-feast-db-2024@postgres.mlops.svc.cluster.local:5432/feast_db

# --- Offline Store ---
# Used for historical feature retrieval (training data)
# File-based with S3/MinIO backend for Parquet files
offline_store:
  type: file

# --- Online Store ---
# Used for low-latency feature serving (prediction time)
online_store:
  type: redis
  connection_string: redis://:changeme-redis-secret-2024@redis.mlops.svc.cluster.local:6379

# --- Entity key serialization ---
entity_key_serialization_version: 3

# --- Flags ---
# Go server for faster feature retrieval (optional)
go_feature_serving: false
